experiment: unet_baseline
model: unet
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  val_fraction: 0.05
  split_seed: 42
  split_file: /work/scratch/$USER/cil-visionavengers-depth/splits/canonical_val_5pct_seed42.json
  image_size: 128
augmentation: none
train:
  epochs: 10
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0
  optimizer: adam
  scheduler: constant
  amp: false
  grad_accum_steps: 1
  num_workers: 4
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
  log_images_every: 1
  num_log_images: 4
paths:
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
checkpoint:
  save_policy: full_model
  keep_latest: true
  keep_best: true
  save_optimizer: true
