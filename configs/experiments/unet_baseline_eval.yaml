experiment:
  name: unet_baseline_eval
  tags:
  - unet
  - baseline
  - unified_eval
model:
  family: unet_baseline
  architecture: UNetBaseline
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  max_depth: 80.0
  val_fraction: 0.05
  split_seed: 42
  image_size: 128
  views:
    train:
      resize_policy: square
      output_grid: model_input
      crop_size: null
      normalize: none
    eval:
      resize_policy: square
      output_grid: model_input
      crop_size: null
      normalize: none
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
paths:
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
