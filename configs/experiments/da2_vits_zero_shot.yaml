experiment: da2_vits_zero_shot
model: da2_vits
trainable: frozen
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  val_fraction: 0.05
  split_seed: 42
  image_size: 518
augmentation: none
train:
  epochs: 0
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.0
  optimizer: adamw
  scheduler: constant
  amp: false
  grad_accum_steps: 1
  num_workers: 4
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
  log_images_every: 0
  num_log_images: 0
paths:
  da2_repo: external/Depth-Anything-V2
  da2_checkpoint_dir: /work/scratch/$USER/cil-visionavengers-depth/models/da2
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
checkpoint:
  save_policy: trainable_only
  keep_latest: false
  keep_best: false
  save_optimizer: false
