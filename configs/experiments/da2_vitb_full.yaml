experiment:
  name: da2_vitb_full
  tags:
  - da2
  - vitb
  - full_finetune
  - legacy_square
model:
  family: da2_relative
  encoder: vitb
base:
  trainable_scope: full
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  eval_protocol: legacy_square
  val_fraction: 0.1
  split_seed: 42
  image_size: 392
  views:
    train:
      resize_policy: square
      output_grid: model_input
      crop_size: null
      normalize: imagenet
    eval:
      resize_policy: square
      output_grid: model_input
      crop_size: null
      normalize: imagenet
augmentation:
  preset: none
supervision:
  teacher_mask:
    enabled: false
train:
  epochs: 5
  batch_size: 1
  learning_rate: 2.0e-06
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: constant
  amp: true
  grad_accum_steps: 4
  num_workers: 2
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
  log_images_every: 1
  num_log_images: 4
paths:
  da2_repo: external/Depth-Anything-V2
  da2_checkpoint_dir: /work/scratch/$USER/cil-visionavengers-depth/models/da2
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
adapter:
  enabled: false
  type: none
checkpoint:
  save_policy: trainable_only
  keep_latest: true
  keep_best: true
  save_optimizer: true
