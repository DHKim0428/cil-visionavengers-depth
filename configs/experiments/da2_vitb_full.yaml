experiment: da2_vitb_full
model: da2_vitb
trainable: full
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  val_fraction: 0.1
  split_seed: 42
  image_size: 392
augmentation: basic
train:
  epochs: 5
  batch_size: 1
  learning_rate: 2.0e-06
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: constant
  amp: true
  grad_accum_steps: 4
  num_workers: 2
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
  log_images_every: 1
  num_log_images: 4
paths:
  da2_repo: external/Depth-Anything-V2
  da2_checkpoint_dir: /work/scratch/$USER/cil-visionavengers-depth/models/da2
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
checkpoint:
  save_policy: trainable_only
  keep_latest: true
  keep_best: true
  save_optimizer: true
