experiment: unet_disp_518_5pct_noaug
model: unet_disp
refiner:
  conditioning: rgb
  base_channels: 21
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  val_fraction: 0.05
  split_seed: 42
  split_file: configs/splits/cil_depth_val_05pct_seed42.json
  image_size: 518
augmentation: none
train:
  epochs: 20
  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.0
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: constant
  amp: true
  grad_accum_steps: 2
  num_workers: 3
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
  log_images_every: 1
  num_log_images: 4
paths:
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
checkpoint:
  save_policy: trainable_only
  keep_latest: true
  keep_best: true
  save_optimizer: true
