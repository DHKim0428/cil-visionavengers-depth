experiment:
  name: da2_vitb_zero_shot
  tags:
  - da2
  - vitb
  - zero_shot
  - canonical_eval
model:
  family: da2_relative
  encoder: vitb
base:
  trainable_scope: frozen
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  eval_protocol: raw_infer_native
  val_fraction: 0.05
  split_seed: 42
  image_size: 518
  views:
    train:
      resize_policy: dpt_lower_bound
      output_grid: model_input
      crop_size: image_size
      normalize: imagenet
    eval:
      resize_policy: dpt_lower_bound
      output_grid: native_gt
      crop_size: null
      normalize: imagenet
augmentation:
  preset: none
supervision:
  teacher_mask:
    enabled: false
train:
  epochs: 0
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.0
  optimizer: adamw
  scheduler: constant
  amp: false
  grad_accum_steps: 1
  num_workers: 4
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
  log_images_every: 0
  num_log_images: 0
paths:
  da2_repo: external/Depth-Anything-V2
  da2_checkpoint_dir: /work/scratch/$USER/cil-visionavengers-depth/models/da2
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
adapter:
  enabled: false
  type: none
checkpoint:
  save_policy: trainable_only
  keep_latest: false
  keep_best: false
  save_optimizer: false
