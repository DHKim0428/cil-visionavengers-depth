experiment: da2_vits_lora_decoder
model: da2_vits
trainable: frozen
adapter:
  enabled: true
  type: lora
  rank: 8
  alpha: 16
  dropout: 0.05
  target_prefixes:
  - depth_head
data:
  dataset: cil_depth
  root: /cluster/courses/cil/monocular-depth-estimation/train
  val_fraction: 0.05
  split_seed: 42
  image_size: 518
augmentation: basic
train:
  epochs: 10
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: poly_decay
  amp: false
  grad_accum_steps: 1
  num_workers: 4
logging:
  backend: wandb
  entity: cil-visionavengers
  project: cil-visionavengers-depth
  log_images_every: 1
  num_log_images: 4
checkpoint:
  save_policy: trainable_only
  keep_latest: true
  keep_best: true
  save_optimizer: true
paths:
  da2_repo: external/Depth-Anything-V2
  da2_checkpoint_dir: /work/scratch/$USER/cil-visionavengers-depth/models/da2
  output_root: /work/scratch/$USER/cil-visionavengers-depth/checkpoints
